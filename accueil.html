<!DOCTYPE html>
<html>
<head>
  <title>Accueil</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    button {
      padding: 10px;
      margin: 5px;
    }

    #apropos {
      background: #dcf;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .ligne {
      display: flex;
      align-items: center;
      margin: 5px;
    }

    .ligne img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .bulle {
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      background: #dcf8c6;
    }
  </style>
</head>

<body>

<h3 id="profil"></h3>

<button onclick="afficher('apropos')">À propos</button>
<button onclick="afficher('participants')">Participants</button>
<button onclick="afficher('chat')">Chat</button>

<div id="apropos">
  <h3>À propos de moi</h3>
  <p><strong>Nom :</strong> Mike</p>
  <p><strong>ID :</strong> mike_dev01</p>
  <p>Développeur web débutant passionné.</p>
</div>

<div id="participants" style="display:none;">
  <h3>Participants</h3>
  <div id="liste"></div>
</div>

<div id="chat" style="display:none;">
  <h3>Chat privé</h3>

  <select id="destinataire"></select><br><br>

  <input type="text" id="message" placeholder="Ton message">
  <button onclick="envoyer()">Envoyer</button>

  <div id="discussion"></div>
</div>

<script>

let nom = localStorage.getItem("nom");
let users = JSON.parse(localStorage.getItem("users")) || [];
let admin = "MikehmD";

if(!nom) {
  window.location.href = "connexion.html";
}

// afficher profil
document.getElementById("profil").innerHTML =
  "Connecté : " + nom;

// navigation
function afficher(section) {
  ["apropos","participants","chat"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(section).style.display="block";
}

// ================= USERS =================
let html = "";

if(users.length === 0){
  html = "<p>Aucun utilisateur</p>";
}
else if(nom === admin) {

  users.forEach(function(u, index) {
    let photo = u.photo ? u.photo : "https://via.placeholder.com/50";

    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <p>${u.nom}</p>
        <img src="${photo}">
        <br>
        <button onclick="supprimerUser(${index})">Supprimer</button>
      </div>
    `;
  });

} else {
  html = "<p>Accès réservé à l'administrateur</p>";
}

document.getElementById("liste").innerHTML = html;

// supprimer user
function supprimerUser(index) {
  if(nom !== admin) {
    alert("Accès refusé !");
    return;
  }

  users.splice(index, 1);
  localStorage.setItem("users", JSON.stringify(users));
  location.reload();
}

// ================= SELECT =================
let select = document.getElementById("destinataire");

let autres = users.filter(u => u.nom !== nom);

if(autres.length === 0){
  let option = document.createElement("option");
  option.textContent = "Aucun utilisateur";
  select.appendChild(option);
}
else{
  autres.forEach(function(u) {
    let option = document.createElement("option");
    option.value = u.nom;
    option.textContent = u.nom;
    select.appendChild(option);
  });
}

// ================= CHAT =================
function envoyer() {

  let message = document.getElementById("message").value.trim();
  let dest = document.getElementById("destinataire").value;

  if(message === "" || !dest) return;

  let chatId = [nom, dest].sort().join("_");

  let messages = JSON.parse(localStorage.getItem(chatId)) || [];

  messages.push(nom + " : " + message);

  localStorage.setItem(chatId, JSON.stringify(messages));

  document.getElementById("message").value = "";

  afficherChat();
}

function afficherChat() {

  let dest = document.getElementById("destinataire").value;

  if(!dest) return;

  let chatId = [nom, dest].sort().join("_");

  let messages = JSON.parse(localStorage.getItem(chatId)) || [];

  let html = "";

  messages.forEach(function(m) {
    html += "<p>" + m + "</p>";
  });

  document.getElementById("discussion").innerHTML = html;
}

document.getElementById("destinataire")
.addEventListener("change", afficherChat);

// auto charger chat
afficherChat();

</script>

</body>
</html>
