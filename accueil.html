<!DOCTYPE html>
<html>
<head>
  <title>Accueil</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    button {
      padding: 10px;

    #apropos {

    .ligne img {

    }

    .bulle {
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      background: #dcf8c6;
    }
  </style>
</head>

<body>

<h3 id="profil"></h3>

<button onclick="afficher('apropos')">À propos</button>

<div id="apropos">

  <p><strong>Nom :</strong> Mike</p>

</div>

  <h3>Participants</h3>

</div>

<!-- BOUTON (dans le HTML, pas JS) -->
<button onclick="logout()">Se déconnecter</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyDSvKtc0AT0_V7__MdPbVeoiFLIw1VDwuw",
  authDomain: "inspi-da31f.firebaseapp.com",
  projectId: "inspi-da31f",
  storageBucket: "inspi-da31f.firebasestorage.app",
  messagingSenderId: "509371195629",
  appId: "1:509371195629:web:9e3a270f08d93fad4bece4",
  measurementId: "G-FPN228HSVQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 Vérifier connexion
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  } else {
    // afficher email connecté
    document.getElementById("profil").innerHTML =
      "Connecté : " + user.email;
  }
});

// 🔓 logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "login.html";
  });
};
</script>

</body>
</html>
