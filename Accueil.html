<!DOCTYPE html>
<html>
<head>
  <title>Accueil</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    button {
      padding: 10px;
      margin: 5px;
    }

    #apropos {
      background: #dcf;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .ligne {
      display: flex;
      align-items: center;
      margin: 5px;
    }

    .ligne img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin-right: 10px;
    }

    .bulle {
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
      background: #dcf8c6;
    }
  </style>

</head>

<body>

<h3 id="profil"></h3>

<button onclick="afficher('apropos')">À propos</button>
<button onclick="afficher('participants')">Participants</button>
<button onclick="afficher('chat')">Chat</button>

<!-- À PROPOS -->
<div id="apropos">
  <h3>À propos de moi</h3>
  <p><strong>Nom :</strong> Mike</p>
  <p><strong>ID :</strong> mike_dev01</p>
  <p>Développeur web débutant passionné.</p>
</div>

<!-- PARTICIPANTS -->
<div id="participants" style="display:none;">
  <h3>Participants</h3>
  <div id="liste"></div>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
  <h3>Chat privé</h3>

  <select id="destinataire"></select><br><br>

  <input type="text" id="message" placeholder="Ton message">
  <button onclick="envoyer()">Envoyer</button>

  <div id="discussion"></div>
</div>

<script>

// ======================
// 🔐 VARIABLES IMPORTANTES
// ======================
let nom = localStorage.getItem("nom");
let users = JSON.parse(localStorage.getItem("users")) || [];
let admin = "MikehmD";

// sécurité
if(!nom) {
  window.location.href = "inscription.html";
}

// afficher utilisateur connecté
document.getElementById("profil").innerHTML =
  "Connecté : " + nom;


// ======================
// 🔄 NAVIGATION
// ======================
function afficher(section) {
  document.getElementById("apropos").style.display = "none";
  document.getElementById("participants").style.display = "none";
  document.getElementById("chat").style.display = "none";

  document.getElementById(section).style.display = "block";
}


// ======================
// 👥 LISTE UTILISATEURS (ADMIN)
// ======================
let html = "";

if(nom === admin) {

  users.forEach(function(u, index) {
    html += `
      <div style="border:1px solid #ccc; padding:10px; margin:5px;">
        <p>${u.nom}</p>
        <img src="${u.photo}" width="50">
        <br>
        <button onclick="supprimerUser(${index})">Supprimer</button>
      </div>
    `;
  });

} else {
  html = "<p>Accès réservé à l'administrateur</p>";
}

document.getElementById("liste").innerHTML = html;


// ======================
// 🗑️ SUPPRIMER UTILISATEUR
// ======================
function supprimerUser(index) {

  if(nom !== admin) {
    alert("Accès refusé !");
    return;
  }

  users.splice(index, 1);
  localStorage.setItem("users", JSON.stringify(users));

  location.reload();
}


// ======================
// 👤 SELECT UTILISATEURS
// ======================
let select = document.getElementById("destinataire");

users.forEach(function(u) {
  if(u.nom !== nom) {
    let option = document.createElement("option");
    option.value = u.nom;
    option.textContent = u.nom;
    select.appendChild(option);
  }
});


// ======================
// 💬 ENVOYER MESSAGE PRIVÉ
// ======================
function envoyer() {

  let message = document.getElementById("message").value;
  let dest = document.getElementById("destinataire").value;

  if(message === "") return;

  let chatId = [nom, dest].sort().join("_");

  let messages = JSON.parse(localStorage.getItem(chatId)) || [];

  messages.push(nom + " : " + message);

  localStorage.setItem(chatId, JSON.stringify(messages));

  document.getElementById("message").value = "";

  afficherChat();
}


// ======================
// 💬 AFFICHER CHAT PRIVÉ
// ======================
function afficherChat() {

  let dest = document.getElementById("destinataire").value;

  if(!dest) return;

  let chatId = [nom, dest].sort().join("_");

  let messages = JSON.parse(localStorage.getItem(chatId)) || [];

  let html = "";

  messages.forEach(function(m) {
    html += "<p>" + m + "</p>";
  });

  document.getElementById("discussion").innerHTML = html;
}

// changement utilisateur
document.getElementById("destinataire")
.addEventListener("change", afficherChat);

</script>

</body>
    </html>
