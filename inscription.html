<!DOCTYPE html>
<html>
<head>
  <title>Inscription</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    input, button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      font-size: 16px;
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Ton nom"><br>
<input type="password" id="mdp" placeholder="Mot de passe"><br>
<input type="file" id="photo"><br>

<img id="preview" style="display:none;">

<button onclick="inscrire()">S'inscrire</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSvKtc0AT0_V7__MdPbVeoiFLIw1VDwuw",
  authDomain: "inspi-da31f.firebaseapp.com",
  projectId: "inspi-da31f",
  storageBucket: "inspi-da31f.firebasestorage.app",
  messagingSenderId: "509371195629",
  appId: "1:509371195629:web:9e3a270f08d93fad4bece4",
  measurementId: "G-FPN228HSVQ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.inscrire = function () {
  let email = document.getElementById("nom").value;
  let password = document.getElementById("mdp").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      alert("Compte créé !");
      window.location.href = "login.html";
    })
    .catch((error) => {
      alert(error.message);
    });
};
</script>


</body>
</html>
