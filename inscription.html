<!DOCTYPE html>
<html>
<head>
  <title>Inscription</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    input, button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      font-size: 16px;
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Ton nom"><br>
<input type="password" id="mdp" placeholder="Mot de passe"><br>
<input type="file" id="photo"><br>

<img id="preview" style="display:none;">

<button onclick="inscrire()">S'inscrire</button>

<script>

// Aperçu photo
document.getElementById("photo").addEventListener("change", function() {
  let file = this.files[0];

  if(file) {
    let reader = new FileReader();

    reader.onload = function(e) {
      let img = document.getElementById("preview");
      img.src = e.target.result;
      img.style.display = "block";
    };

    reader.readAsDataURL(file);
  }
});

function inscrire() {

  let nom = document.getElementById("nom").value.trim();
  let mdp = document.getElementById("mdp").value.trim();
  let file = document.getElementById("photo").files[0];

  if(nom === "" || mdp === "") {
    alert("Remplis tous les champs !");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // éviter doublon
  let existe = users.find(u => u.nom === nom);
  if(existe) {
    alert("Nom déjà utilisé !");
    return;
  }

  if(!file) {
    enregistrerUtilisateur(nom, mdp, "");
  } else {
    let reader = new FileReader();

    reader.onload = function(e) {
      enregistrerUtilisateur(nom, mdp, e.target.result);
    };

    reader.readAsDataURL(file);
  }
}

function enregistrerUtilisateur(nom, mdp, photo) {

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({
    nom: nom,
    mdp: mdp,
    photo: photo
  });

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("nom", nom);

  alert("Compte créé !");
  window.location.href = "connexion.html";
}

</script>

</body>
</html>
