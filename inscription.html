<!DOCTYPE html>
<html>
<head>
  <title>Inscription</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
      background: #f4f4f4;
    }

    input, button {
      width: 90%;
      padding: 15px;
      margin: 10px;
      font-size: 16px;
    }

    img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>Créer un compte</h2>

<input type="text" id="nom" placeholder="Ton nom"><br>
<input type="password" id="mdp" placeholder="Mot de passe"><br>
<input type="file" id="photo"><br>

<img id="preview" style="display:none;">

<button onclick="inscrire()">S'inscrire</button>

<script>

// ✅ AJOUT COMPTE PAR DÉFAUT
let users = JSON.parse(localStorage.getItem("users")) || [];

// vérifier si Mike existe déjà
let existe = users.find(u => u.nom === "Mike");

if(!existe){
  users.push({
    nom: "Mike",
    mdp: "0110",
    photo: ""
  });

  localStorage.setItem("users", JSON.stringify(users));
}

// ===== TON CODE NORMAL =====

// Aperçu photo
document.getElementById("photo").addEventListener("change", function() {
  let file = this.files[0];

  if(file) {
    let reader = new FileReader();
    reader.onload = function() {
      let img = document.getElementById("preview");
      img.src = reader.result;
      img.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

function inscrire() {
  let nom = document.getElementById("nom").value;
  let mdp = document.getElementById("mdp").value;
  let file = document.getElementById("photo").files[0];

  if(nom === "" || mdp === "") return;

  if(!file){
    enregistrerUtilisateur(nom, mdp, "");
    return;
  }

  let reader = new FileReader();
  reader.onload = function(){
    enregistrerUtilisateur(nom, mdp, reader.result);
  };
  reader.readAsDataURL(file);
}

function enregistrerUtilisateur(nom, mdp, photo) {
  let users = JSON.parse(localStorage.getItem("users")) || [];

  users.push({ nom, mdp, photo });

  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("nom", nom);

  window.location.href = "accueil.html";
}

</script>

</body>
</html>
